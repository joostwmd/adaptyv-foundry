# Render Blueprint — https://render.com/docs/blueprint-spec
#
# MCP_HTTP_API_KEY: generateValue — Render creates a secret on deploy; copy it from
# Dashboard → Environment → MCP_HTTP_API_KEY and use the same value in Cursor as
#   Authorization: Bearer <MCP_HTTP_API_KEY>
#
# FOUNDRY_API_TOKEN: sync false — you MUST set this in the dashboard (Adaptyv Foundry
# API token). Until it is set, the service will crash after MCP_HTTP_API_KEY passes.
# For a mock-only smoke test, set FOUNDRY_USE_MOCK to "1" and any non-empty token.

services:
  - type: web
    name: adaptyv-foundry-mcp
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MODE
        value: http
      - key: HOST
        value: 0.0.0.0
      - key: FOUNDRY_USE_MOCK
        value: "0"
      - key: FOUNDRY_API_TOKEN
        sync: false
      - key: MCP_HTTP_API_KEY
        generateValue: true
