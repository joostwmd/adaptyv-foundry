# Adaptyv Foundry MCP (Streamable HTTP) on Fly.io
#
# First deploy: fly launch (pick app name / region) or change `app` below, then fly deploy.
# Required secrets:
#   fly secrets set FOUNDRY_API_TOKEN="..." MCP_HTTP_API_KEY="..."
# Optional:
#   fly secrets set FOUNDRY_USE_MOCK=0
#   fly secrets set FOUNDRY_API_BASE_URL="https://..."
#   fly secrets set ALLOWED_ORIGINS="https://your-origin"
#
# MCP URL after deploy: https://<app>.fly.dev/mcp  (send Authorization: Bearer <MCP_HTTP_API_KEY>)

app = "adaptyv-foundry-mcp"
primary_region = "iad"

[build]

[env]
  HOST = "0.0.0.0"
  MODE = "http"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
